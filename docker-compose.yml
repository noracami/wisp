services:
  wisp:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: wisp
      POSTGRES_PASSWORD: wisp
      POSTGRES_DB: wisp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
