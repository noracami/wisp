name: Build and Push

on:
  push:
    branches: [main, feat/multi-platform-assistant]

env:
  GAR_LOCATION: asia-east1
  GAR_REPOSITORY: wisp
  IMAGE_NAME: wisp
  PROJECT_ID: careful-broker-485510-r0
  WORKLOAD_IDENTITY_PROVIDER: projects/514754876772/locations/global/workloadIdentityPools/github/providers/github-actions
  SERVICE_ACCOUNT: github-actions@careful-broker-485510-r0.iam.gserviceaccount.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Notify Discord
        if: always()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993
            STATUS="✅ Deployed"
          else
            COLOR=15158332
            STATUS="❌ Failed"
          fi
          # Take first line of commit message only, escape for JSON
          MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g')
          jq -n \
            --arg title "$STATUS" \
            --arg desc "**Commit:** ${GITHUB_SHA::7}
**Message:** $MSG
**Branch:** ${{ github.ref_name }}" \
            --argjson color "$COLOR" \
            '{embeds: [{title: $title, description: $desc, color: $color}]}' | \
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d @-
